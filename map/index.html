<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GAA Pitch Finder</title>
<link rel="stylesheet" href="vendor/leaflet.css"/>
<link rel="stylesheet" href="vendor/MarkerCluster.css"/>
<link rel="stylesheet" href="vendor/MarkerCluster.Default.css"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: #1a1a1a;
}

body {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ── Top bar ── */
#topbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: #242424;
  border-bottom: 1px solid #383838;
  flex-shrink: 0;
}

#filters-label {
  color: #ffffff;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.5px;
  white-space: nowrap;
  padding-right: 12px;
  border-right: 1px solid #484848;
  flex-shrink: 0;
}

#selects {
  display: flex;
  gap: 8px;
  flex: 1;
  flex-wrap: wrap;
}

select {
  flex: 1 1 140px;
  background: #333;
  color: #e0e0e0;
  border: 1px solid #555;
  border-radius: 4px;
  padding: 6px 10px;
  font-size: 13px;
  cursor: pointer;
  min-width: 0;
}

select:focus { outline: none; border-color: #888; }
select:disabled { opacity: 0.4; cursor: default; }

#count-badge {
  flex-shrink: 0;
  font-size: 12px;
  color: #777;
  white-space: nowrap;
}

#reset-btn {
  flex-shrink: 0;
  background: none;
  border: 1px solid #484848;
  color: #aaa;
  cursor: pointer;
  font-size: 12px;
  padding: 5px 10px;
  border-radius: 4px;
  white-space: nowrap;
  transition: background 0.15s, color 0.15s;
}
#reset-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }

#cluster-btn {
  flex-shrink: 0;
  background: none;
  border: 1px solid #484848;
  color: #aaa;
  cursor: pointer;
  font-size: 12px;
  padding: 5px 10px;
  border-radius: 4px;
  white-space: nowrap;
  transition: background 0.15s, color 0.15s;
}
#cluster-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
#cluster-btn.dots-active { border-color: #ffffcc; color: #ffffcc; }

#theme-btn {
  flex-shrink: 0;
  background: none;
  border: none;
  cursor: pointer;
  font-size: 20px;
  line-height: 1;
  padding: 4px 6px;
  border-radius: 50%;
  transition: background 0.15s;
}
#theme-btn:hover { background: rgba(255,255,255,0.1); }

/* ── Map ── */
#map { flex: 1; position: relative; }

/* ── Loading overlay ── */
#loading {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #ccc;
  font-size: 14px;
  z-index: 999;
  background: rgba(26,26,26,0.88);
  padding: 12px 20px;
  border-radius: 6px;
  pointer-events: none;
}

/* ── Tooltip ── */
.leaflet-tooltip {
  background: rgba(20, 20, 20, 0.93);
  border: 1px solid #383838;
  border-radius: 6px;
  padding: 6px 10px;
  box-shadow: 0 2px 14px rgba(0,0,0,0.55);
  pointer-events: none;
}
.leaflet-tooltip::before { display: none; }

.tt-club { font-size: 13px; font-weight: 600; color: #f0f0f0; line-height: 1.35; }
.tt-pitch { font-size: 12px; color: #999; margin-top: 1px; }
.tt-loc { font-size: 11px; color: #666; margin-top: 2px; }
.tt-hint { font-size: 10px; color: #444; margin-top: 5px; letter-spacing: 0.2px; }

/* ── Popup ── */
.leaflet-popup-content-wrapper {
  background: #1c1c1c;
  border: 1px solid #383838;
  border-radius: 8px;
  box-shadow: 0 6px 28px rgba(0,0,0,0.7);
  color: #e0e0e0;
}
.leaflet-popup-tip-container { margin-top: -1px; }
.leaflet-popup-tip { background: #1c1c1c; box-shadow: none; }
.leaflet-popup-content {
  margin: 14px 16px;
  min-width: 180px;
}
.leaflet-popup-close-button {
  color: #555 !important;
  font-size: 20px !important;
  line-height: 24px !important;
  width: 24px !important;
  height: 24px !important;
  top: 6px !important;
  right: 8px !important;
}
.leaflet-popup-close-button:hover { color: #bbb !important; background: none !important; }

.pop-club { font-size: 15px; font-weight: 600; color: #ffffff; line-height: 1.3; }
.pop-pitch { font-size: 13px; color: #999; margin-top: 2px; }
.pop-loc { font-size: 12px; color: #666; margin-top: 4px; }
.pop-sep { border: none; border-top: 1px solid #2e2e2e; margin: 10px 0 8px; }
.pop-dir {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  color: #5b9cf6;
  font-size: 13px;
  font-weight: 500;
  text-decoration: none;
}
.pop-dir:hover { color: #82b4f8; }

/* ── Light theme ── */
body.light { background: #f5f5f5; }
body.light #topbar { background: #ffffff; border-bottom-color: #e0e0e0; }
body.light #filters-label { color: #333; border-right-color: #ddd; }
body.light select { background: #f9f9f9; color: #333; border-color: #ccc; }
body.light #count-badge { color: #888; }
body.light #reset-btn { border-color: #ddd; color: #666; }
body.light #reset-btn:hover { background: rgba(0,0,0,0.06); color: #333; }
body.light #cluster-btn { border-color: #ddd; color: #666; }
body.light #cluster-btn:hover { background: rgba(0,0,0,0.06); color: #333; }
body.light #cluster-btn.dots-active { border-color: #999900; color: #999900; }
body.light #theme-btn:hover { background: rgba(0,0,0,0.08); }
body.light #loading { background: rgba(245,245,245,0.92); color: #555; }
body.light .leaflet-tooltip { background: rgba(255,255,255,0.96); border-color: #ddd; }
body.light .tt-club { color: #111; }
body.light .tt-pitch { color: #555; }
body.light .tt-loc { color: #999; }
body.light .tt-hint { color: #bbb; }
body.light .leaflet-popup-content-wrapper { background: #fff; border-color: #ddd; color: #333; }
body.light .leaflet-popup-tip { background: #fff; }
body.light .pop-club { color: #111; }
body.light .pop-pitch { color: #555; }
body.light .pop-loc { color: #999; }
body.light .pop-sep { border-top-color: #eee; }

/* ── Mobile ── */
@media (max-width: 600px) {
  #filters-label { display: none; }
  #topbar { padding: 8px 10px; gap: 6px; }
  select { font-size: 12px; padding: 6px 8px; flex-basis: calc(50% - 4px); }
  #theme-btn { font-size: 18px; }
  #count-badge { display: none; }
}
</style>
</head>
<body>

<div id="topbar">
  <div id="filters-label">FILTERS</div>
  <div id="selects">
    <select id="sel-region" aria-label="Filter by region"><option value="">Region (All)</option></select>
    <select id="sel-county" aria-label="Filter by county or country"><option value="">Location (All)</option></select>
    <select id="sel-club"   aria-label="Filter by club"><option value="">Club (All)</option></select>
    <select id="sel-pitch"  aria-label="Filter by pitch"><option value="">Pitch (All)</option></select>
  </div>
  <span id="count-badge" aria-live="polite"></span>
  <button id="reset-btn" aria-label="Reset all filters to Ireland">Reset</button>
  <button id="cluster-btn" aria-label="Switch to dots view" title="Toggle cluster / dots view">Dots</button>
  <button id="theme-btn" aria-label="Toggle day/night mode" title="Toggle day/night mode">🌙</button>
</div>

<div id="map">
  <div id="loading">Loading pitches…</div>
</div>

<script src="vendor/leaflet.js"></script>
<script src="vendor/leaflet.markercluster.js"></script>
<script>
// ── Tile layers ──────────────────────────────────────────────────────────────
const darkTiles = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  { attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>', subdomains: 'abcd', maxZoom: 19 }
);
const lightTiles = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
  { attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>', subdomains: 'abcd', maxZoom: 19 }
);

const map = L.map('map', {
  center: [53.5, -8],
  zoom: 7,
  layers: [darkTiles],
  preferCanvas: true
});

let isDark = true;

document.getElementById('theme-btn').addEventListener('click', () => {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  if (isDark) {
    map.removeLayer(lightTiles);
    map.addLayer(darkTiles);
    document.getElementById('theme-btn').textContent = '🌙';
  } else {
    map.removeLayer(darkTiles);
    map.addLayer(lightTiles);
    document.getElementById('theme-btn').textContent = '☀️';
  }
});

// ── Filters ──────────────────────────────────────────────────────────────────
const selRegion  = document.getElementById('sel-region');
const selCounty  = document.getElementById('sel-county');
const selClub    = document.getElementById('sel-club');
const selPitch   = document.getElementById('sel-pitch');
const countBadge = document.getElementById('count-badge');

let allClubs = [];
let clustered = true;

function makeClusterLayer() {
  return L.markerClusterGroup({
    chunkedLoading: true,
    maxClusterRadius: 40,
    showCoverageOnHover: false,
    spiderfyOnMaxZoom: true
  });
}

let markerLayer = makeClusterLayer();
map.addLayer(markerLayer);

function setOptions(el, values, placeholder) {
  const prev = el.value;
  el.innerHTML = `<option value="">${placeholder}</option>`;
  values.forEach(v => {
    const o = document.createElement('option');
    o.value = o.textContent = v;
    el.appendChild(o);
  });
  if (values.includes(prev)) el.value = prev;
}

function getFiltered(region, county, club, pitch) {
  return allClubs.filter(c =>
    (!region || c.r === region) &&
    (!county || c.k === county) &&
    (!club   || c.c === club)   &&
    (!pitch  || c.p === pitch)
  );
}

function cascadeFilters() {
  const region = selRegion.value;
  const county = selCounty.value;
  const club   = selClub.value;

  const countyPool = allClubs.filter(c => !region || c.r === region);
  const counties = [...new Set(countyPool.map(c => c.k))].sort();
  setOptions(selCounty, counties, 'Location (All)');

  const clubPool = allClubs.filter(c =>
    (!region || c.r === region) && (!county || c.k === county)
  );
  const clubs = [...new Set(clubPool.map(c => c.c))].sort();
  setOptions(selClub, clubs, 'Club (All)');

  const pitchPool = getFiltered(region, county, club, '');
  const pitches = [...new Set(pitchPool.map(c => c.p).filter(Boolean))].sort();
  setOptions(selPitch, pitches, 'Pitch (All)');
  selPitch.disabled = pitches.length < 2;
}

// ── Marker style ─────────────────────────────────────────────────────────────
function markerStyle() {
  return { radius: 5, fillColor: '#ffffcc', color: '#cccc88', weight: 0.5, opacity: 0.9, fillOpacity: 0.85 };
}

// ── Markers ──────────────────────────────────────────────────────────────────
function renderMarkers() {
  markerLayer.clearLayers();

  const region = selRegion.value;
  const county = selCounty.value;
  const club   = selClub.value;
  const pitch  = selPitch.value;
  const visible = getFiltered(region, county, club, pitch);

  countBadge.textContent = `${visible.length.toLocaleString()} pitch${visible.length !== 1 ? 'es' : ''}`;

  visible.forEach(c => {
    const ePitch = escHtml(c.p);
    const eClub  = escHtml(c.c);
    const eLoc   = escHtml(c.k);

    // Reconstruct directions URL from coordinates — do not interpolate c.d directly
    const mapsUrl = `https://maps.google.com/?daddr=${encodeURIComponent(c.la)},${encodeURIComponent(c.lo)}`;

    const tooltip = `<div class="tt-club">${eClub}</div>${ePitch ? `<div class="tt-pitch">${ePitch}</div>` : ''}<div class="tt-loc">${eLoc}</div><div class="tt-hint">Click for directions</div>`;

    const dirLink = `<hr class="pop-sep"><a class="pop-dir" href="${mapsUrl}" target="_blank" rel="noopener noreferrer"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>Google Maps Directions</a>`;
    const popup = `<div class="pop-club">${eClub}</div>${ePitch ? `<div class="pop-pitch">${ePitch}</div>` : ''}<div class="pop-loc">${eLoc}</div>${dirLink}`;

    L.circleMarker([c.la, c.lo], markerStyle())
      .bindTooltip(tooltip, { sticky: true, opacity: 1 })
      .bindPopup(popup, { maxWidth: 280 })
      .addTo(markerLayer);
  });

  // Fit bounds when a filter narrows the view
  if (visible.length > 0 && visible.length < allClubs.length) {
    const latlngs = visible.map(c => [c.la, c.lo]);
    map.fitBounds(latlngs, { padding: [40, 40], maxZoom: 14 });
  }
}

function escHtml(str) {
  return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── Cluster / dots toggle ────────────────────────────────────────────────────
const clusterBtn = document.getElementById('cluster-btn');

clusterBtn.addEventListener('click', () => {
  clustered = !clustered;
  map.removeLayer(markerLayer);
  markerLayer = clustered ? makeClusterLayer() : L.layerGroup();
  map.addLayer(markerLayer);
  clusterBtn.textContent = clustered ? 'Dots' : 'Cluster';
  clusterBtn.setAttribute('aria-label', clustered ? 'Switch to dots view' : 'Switch to cluster view');
  clusterBtn.classList.toggle('dots-active', !clustered);
  renderMarkers();
});

// ── Reset ────────────────────────────────────────────────────────────────────
document.getElementById('reset-btn').addEventListener('click', () => {
  selRegion.value = 'Ireland';
  selCounty.value = '';
  selClub.value   = '';
  selPitch.value  = '';
  cascadeFilters();
  renderMarkers();
  map.setView([53.5, -8], 7);
});

// ── Event wiring ─────────────────────────────────────────────────────────────
selRegion.addEventListener('change', () => {
  selCounty.value = '';
  selClub.value   = '';
  selPitch.value  = '';
  cascadeFilters();
  renderMarkers();
});

selCounty.addEventListener('change', () => {
  selClub.value  = '';
  selPitch.value = '';
  cascadeFilters();
  renderMarkers();
});

selClub.addEventListener('change', () => {
  selPitch.value = '';
  cascadeFilters();
  renderMarkers();
});

selPitch.addEventListener('change', renderMarkers);

// ── Load data ────────────────────────────────────────────────────────────────
fetch('data.json')
  .then(r => r.json())
  .then(data => {
    allClubs = data;
    const regions = [...new Set(data.map(c => c.r))].sort();
    setOptions(selRegion, regions, 'Region (All)');
    selRegion.value = 'Ireland';
    cascadeFilters();
    renderMarkers();
    document.getElementById('loading').remove();
  })
  .catch(() => {
    const loading = document.getElementById('loading');
    loading.textContent = 'Failed to load pitch data';
    loading.style.color = '#f87171';
  });
</script>
</body>
</html>
